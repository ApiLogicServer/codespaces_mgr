"graphics": []
"models":
- "classname": |-
    Customer
  "code": "class Customer(Base):\n    __tablename__ = 'customer'\n    \n    id = Column(Integer,\
    \ primary_key=True, autoincrement=True)\n    name = Column(String)\n    balance\
    \ = Column(Decimal)\n    credit_limit = Column(Decimal)"
  "description": |-
    Represents customers in the system with a balance and credit limit.
  "name": |-
    Customer
- "classname": |-
    Order
  "code": "class Order(Base):\n    __tablename__ = 'order'\n    \n    id = Column(Integer,\
    \ primary_key=True, autoincrement=True)\n    customer_id = Column(ForeignKey('customer.id'))\n\
    \    date_shipped = Column(DateTime)\n    notes = Column(String)\n    amount_total\
    \ = Column(Decimal)"
  "description": |-
    Represents customer orders including a total amount.
  "name": |-
    Order
- "classname": |-
    Item
  "code": "class Item(Base):\n    __tablename__ = 'item'\n    \n    id = Column(Integer,\
    \ primary_key=True, autoincrement=True)\n    order_id = Column(ForeignKey('order.id'))\n\
    \    product_id = Column(ForeignKey('product.id'))\n    quantity = Column(Integer)\n\
    \    unit_price = Column(Decimal)\n    amount = Column(Decimal)"
  "description": |-
    Represents items in each order with calculated amount.
  "name": |-
    Item
- "classname": |-
    Product
  "code": "class Product(Base):\n    __tablename__ = 'product'\n    \n    id = Column(Integer,\
    \ primary_key=True, autoincrement=True)\n    name = Column(String)\n    unit_price\
    \ = Column(Decimal)"
  "description": |-
    Represents products available for orders.
  "name": |-
    Product
"name": |-
  CustomerOrderManagementSystem
"rules":
- "code": |-
    Rule.constraint(validate=Customer,
                    as_condition=lambda row: row.balance <= row.credit_limit,
                    error_msg="Customer balance ({row.balance}) exceeds credit limit ({row.credit_limit})")
  "description": |-
    Ensures a customer's balance does not exceed their credit limit.
  "entity": |-
    Customer
  "name": |-
    Customer Balance Constraint
  "use_case": |-
    Check Credit
- "code": |-
    Rule.sum(derive=Order.amount_total, as_sum_of=Item.amount)
  "description": |-
    Calculates order total as the sum of its item amounts.
  "entity": |-
    Order
  "name": |-
    Order Total Calculation
  "use_case": |-
    Check Credit
- "code": |-
    Rule.formula(derive=Item.amount,
                 as_expression=lambda row: row.quantity * row.unit_price)
  "description": |-
    Calculates item amount as quantity times unit price.
  "entity": |-
    Item
  "name": |-
    Item Amount Calculation
  "use_case": |-
    Check Credit
- "code": |-
    Rule.sum(derive=Customer.balance,
                 as_sum_of=Order.amount_total,
                 where=lambda row: row.date_shipped is None)
  "description": |-
    Derives customer balance as sum of unpaid orders.
  "entity": |-
    Customer
  "name": |-
    Customer Balance Calculation
  "use_case": |-
    Check Credit
- "code": |-
    Rule.copy(derive=Item.unit_price, from_parent=Product.unit_price)
  "description": |-
    Copies product unit price into item unit price.
  "entity": |-
    Item
  "name": |-
    Item Unit Price Copy
  "use_case": |-
    Check Credit
- "code": |-
    Rule.after_flush_row_event(on_class=Order, calling=kafka_producer.send_row_to_kafka,
                               if_condition=lambda row: row.date_shipped is not None,
                               with_args={"topic": "order_shipping"})
  "description": |-
    Sends order details to Kafka if the order is shipped.
  "entity": |-
    Order
  "name": |-
    Order Kafka Integration
  "use_case": |-
    App Integration
"test_data": |-
  from datetime import date

  # Customers
  customer1 = Customer(id=1, name="John Doe", balance=Decimal('100.00'), credit_limit=Decimal('500.00'))
  customer2 = Customer(id=2, name="Jane Smith", balance=Decimal('200.00'), credit_limit=Decimal('800.00'))
  customer3 = Customer(id=3, name="Alice Johnson", balance=Decimal('150.00'), credit_limit=Decimal('750.00'))
  customer4 = Customer(id=4, name="Bob Brown", balance=Decimal('120.00'), credit_limit=Decimal('600.00'))

  # Products
  product1 = Product(id=1, name="Laptop", unit_price=Decimal('1000.00'))
  product2 = Product(id=2, name="Mouse", unit_price=Decimal('25.00'))
  product3 = Product(id=3, name="Keyboard", unit_price=Decimal('45.00'))
  product4 = Product(id=4, name="Monitor", unit_price=Decimal('150.00'))

  # Orders
  order1 = Order(id=1, customer_id=1, date_shipped=None, notes="Urgent order", amount_total=Decimal('0.00'))
  order2 = Order(id=2, customer_id=2, date_shipped=date(2023, 10, 15), notes="Gift order", amount_total=Decimal('0.00'))
  order3 = Order(id=3, customer_id=3, date_shipped=None, notes="Bulk purchase", amount_total=Decimal('0.00'))
  order4 = Order(id=4, customer_id=4, date_shipped=date(2023, 9, 5), notes="Regular order", amount_total=Decimal('0.00'))

  # Items
  item1 = Item(id=1, order_id=1, product_id=1, quantity=1, unit_price=Decimal('1000.00'), amount=Decimal('1000.00'))
  item2 = Item(id=2, order_id=2, product_id=2, quantity=2, unit_price=Decimal('25.00'), amount=Decimal('50.00'))
  item3 = Item(id=3, order_id=3, product_id=3, quantity=3, unit_price=Decimal('45.00'), amount=Decimal('135.00'))
  item4 = Item(id=4, order_id=4, product_id=4, quantity=1, unit_price=Decimal('150.00'), amount=Decimal('150.00'))
