"models":
- "classname": |-
    Customer
  "code": |-
    class Customer(Base):
        __tablename__ = 'customer'

        id = Column(Integer, primary_key=True, autoincrement=True)
        name = Column(String, nullable=False)
        credit_limit = Column(Decimal, nullable=False)
        balance = Column(Decimal, nullable=False, default=0)
  "description": |-
    Model for Customer entity with balance and credit limit
  "name": |-
    Customer
- "classname": |-
    Order
  "code": |-
    class Order(Base):
        __tablename__ = 'order'

        id = Column(Integer, primary_key=True, autoincrement=True)
        customer_id = Column(Integer, ForeignKey('customer.id'))
        notes = Column(String)
        date_shipped = Column(Date, nullable=True)
        amount_total = Column(Decimal, nullable=False, default=0)
  "description": |-
    Model for Order entity with relation to Customer
  "name": |-
    Order
- "classname": |-
    Item
  "code": |-
    class Item(Base):
        __tablename__ = 'item'

        id = Column(Integer, primary_key=True, autoincrement=True)
        order_id = Column(Integer, ForeignKey('order.id'))
        product_id = Column(Integer, ForeignKey('product.id'))
        quantity = Column(Integer, nullable=False)
        unit_price = Column(Decimal, nullable=False)
        amount = Column(Decimal, nullable=False, default=0)
  "description": |-
    Model for Item entity with references to Order and Product
  "name": |-
    Item
- "classname": |-
    Product
  "code": |-
    class Product(Base):
        __tablename__ = 'product'

        id = Column(Integer, primary_key=True, autoincrement=True)
        name = Column(String, nullable=False)
        unit_price = Column(Decimal, nullable=False)
  "description": |-
    Model for Product entity
  "name": |-
    Product
"name": |-
  CommerceSystem
"rules":
- "code": |-
    Rule.constraint(validate=Customer,
        as_condition=lambda row: row.balance <= row.credit_limit,
        error_msg="Customer balance ({row.balance}) exceeds credit limit ({row.credit_limit})")
  "description": |-
    Check customer's balance against their credit limit.
  "entity": |-
    Customer
  "name": |-
    CustomerBalanceConstraint
  "use_case": |-
    Check Credit
- "code": |-
    Rule.sum(derive=Customer.balance, as_sum_of=Order.amount_total, where=lambda row: row.date_shipped is None)
  "description": |-
    Sum Order.amount_total for Customer balance.
  "entity": |-
    Customer
  "name": |-
    CustomerBalanceSumRule
  "use_case": |-
    Check Credit
- "code": |-
    Rule.sum(derive=Order.amount_total, as_sum_of=Item.amount)
  "description": |-
    Sum Item.amount for Order amount_total.
  "entity": |-
    Order
  "name": |-
    OrderAmountTotalSumRule
  "use_case": |-
    Check Credit
- "code": |-
    Rule.formula(derive=Item.amount, as_expression=lambda row: row.quantity * row.unit_price)
  "description": |-
    Compute Item amount as quantity * unit_price.
  "entity": |-
    Item
  "name": |-
    ItemAmountFormulaRule
  "use_case": |-
    Check Credit
- "code": |-
    Rule.copy(derive=Item.unit_price, from_parent=Product.unit_price)
  "description": |-
    Copy Product.unit_price to Item.unit_price.
  "entity": |-
    Item
  "name": |-
    ItemUnitPriceCopyRule
  "use_case": |-
    Check Credit
- "code": |-
    Rule.after_flush_row_event(on_class=Order, calling=kafka_producer.send_row_to_kafka,
        if_condition=lambda row: row.date_shipped is not None,
        with_args={"topic": "order_shipping"})
  "description": |-
    Send Order data to Kafka if date_shipped is not None.
  "entity": |-
    Order
  "name": |-
    OrderKafkaEventRule
  "use_case": |-
    App Integration
