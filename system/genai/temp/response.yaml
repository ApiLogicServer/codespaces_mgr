"models":
- "classname": |-
    Customer
  "code": |-
    class Customer(Base):
        __tablename__ = 'customer'

        Id = Column(Integer, primary_key=True, autoincrement=True)
        Name = Column(String, nullable=False)
        Balance = Column(Decimal, nullable=False)
        CreditLimit = Column(Decimal, nullable=False)
  "description": |-
    Customer details including balance and credit limit
  "name": |-
    Customer
- "classname": |-
    Order
  "code": |-
    class Order(Base):
        __tablename__ = 'order'

        Id = Column(Integer, primary_key=True, autoincrement=True)
        CustomerId = Column(Integer, ForeignKey('customer.Id'))
        AmountTotal = Column(Decimal, nullable=False)
        DateShipped = Column(DateTime)
        Notes = Column(String)
  "description": |-
    Orders placed by customers with related information
  "name": |-
    Order
- "classname": |-
    Item
  "code": |-
    class Item(Base):
        __tablename__ = 'item'

        Id = Column(Integer, primary_key=True, autoincrement=True)
        OrderId = Column(Integer, ForeignKey('order.Id'))
        ProductId = Column(Integer, ForeignKey('product.Id'))
        Quantity = Column(Integer)
        Amount = Column(Decimal, nullable=False)
        UnitPrice = Column(Decimal, nullable=False)
  "description": |-
    Items in an order with specific product and unit price details
  "name": |-
    Item
- "classname": |-
    Product
  "code": |-
    class Product(Base):
        __tablename__ = 'product'

        Id = Column(Integer, primary_key=True, autoincrement=True)
        Name = Column(String, nullable=False)
        UnitPrice = Column(Decimal, nullable=False)
  "description": |-
    Product information including price
  "name": |-
    Product
"name": |-
  OrderSystem
"rules":
- "code": |-
    Rule.constraint(validate=Customer, as_condition=lambda row: row.Balance <= row.CreditLimit, error_msg='Balance exceeds credit limit')
  "description": |-
    Ensure customer's balance is within credit limit
  "entity": |-
    Customer
  "name": |-
    CheckCredit1
  "use_case": |-
    Check Credit
- "code": |-
    Rule.sum(derive=Customer.Balance, as_sum_of=Order.AmountTotal, where=lambda row: row.DateShipped is None)
  "description": |-
    Customer balance derived from non-shipped orders sum
  "entity": |-
    Customer
  "name": |-
    CheckCredit2
  "use_case": |-
    Check Credit
- "code": |-
    Rule.sum(derive=Order.AmountTotal, as_sum_of=Item.Amount)
  "description": |-
    Order amount is sum of item amounts
  "entity": |-
    Order
  "name": |-
    CheckCredit3
  "use_case": |-
    Check Credit
- "code": |-
    Rule.formula(derive=Item.Amount, as_expression=lambda row: row.Quantity * row.UnitPrice)
  "description": |-
    Item amount is calculated as quantity times unit price
  "entity": |-
    Item
  "name": |-
    CheckCredit4
  "use_case": |-
    Check Credit
- "code": |-
    Rule.copy(derive=Item.UnitPrice, from_parent=Product.UnitPrice)
  "description": |-
    Item unit price copied from product unit price
  "entity": |-
    Item
  "name": |-
    CheckCredit5
  "use_case": |-
    Check Credit
- "code": |-
    Rule.after_flush_row_event(on_class=Order, calling=kafka_producer.send_row_to_kafka, if_condition=lambda row: row.DateShipped is not None, with_args={'topic': 'order_shipping'})
  "description": |-
    Send Order data to Kafka if date_shipped is not None
  "entity": |-
    Order
  "name": |-
    AppIntegration1
  "use_case": |-
    App Integration
