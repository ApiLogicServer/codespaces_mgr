"graphics": []
"models":
- "classname": |-
    Customer
  "code": |
    class Customer(Base):
        __tablename__ = 'customer'

        id = Column(Integer, primary_key=True, autoincrement=True)
        name = Column(String(255))
        balance = Column(Decimal, default=0.0)
        credit_limit = Column(Decimal)
  "description": |-
    Data model for customers
  "name": |-
    Customer
- "classname": |-
    Order
  "code": |
    class Order(Base):
        __tablename__ = 'order'

        id = Column(Integer, primary_key=True, autoincrement=True)
        customer_id = Column(Integer, ForeignKey('customer.id'))
        date_shipped = Column(DateTime)
        notes = Column(Text)
        amount_total = Column(Decimal, default=0.0)
  "description": |-
    Data model for orders
  "name": |-
    Order
- "classname": |-
    Product
  "code": |
    class Product(Base):
        __tablename__ = 'product'

        id = Column(Integer, primary_key=True, autoincrement=True)
        name = Column(String(255))
        unit_price = Column(Decimal)
  "description": |-
    Data model for products
  "name": |-
    Product
- "classname": |-
    Item
  "code": |
    class Item(Base):
        __tablename__ = 'item'

        id = Column(Integer, primary_key=True, autoincrement=True)
        order_id = Column(Integer, ForeignKey('order.id'))
        product_id = Column(Integer, ForeignKey('product.id'))
        quantity = Column(Integer, nullable=False)
        amount = Column(Decimal, default=0.0)
        unit_price = Column(Decimal)
  "description": |-
    Data model for order items
  "name": |-
    Item
"name": |-
  ECommerceSystem
"rules":
- "code": |-
    Rule.constraint(validate=Customer, as_condition=lambda row: row.balance <= row.credit_limit, error_msg="Customer balance ({row.balance}) exceeds credit limit ({row.credit_limit})")
  "description": |-
    Ensure customer balance does not exceed credit limit
  "entity": |-
    Customer
  "name": |-
    CustomerBalanceConstraint
  "use_case": |-
    Check Credit
- "code": |-
    Rule.sum(derive=Customer.balance, as_sum_of=Order.amount_total, where=lambda row: row.date_shipped is None)
  "description": |-
    Calculate customer's balance by summing order amounts where the order is not yet shipped
  "entity": |-
    Customer
  "name": |-
    CustomerBalanceSumRule
  "use_case": |-
    Check Credit
- "code": |-
    Rule.sum(derive=Order.amount_total, as_sum_of=Item.amount)
  "description": |-
    Calculate order total amount by summing the amounts of contained items
  "entity": |-
    Order
  "name": |-
    OrderAmountTotalRule
  "use_case": |-
    Check Credit
- "code": |-
    Rule.formula(derive=Item.amount, as_expression=lambda row: row.quantity * row.unit_price)
  "description": |-
    Compute item amount as quantity multiplied by unit price
  "entity": |-
    Item
  "name": |-
    ItemAmountFormulaRule
  "use_case": |-
    Check Credit
- "code": |-
    Rule.copy(derive=Item.unit_price, from_parent=Product.unit_price)
  "description": |-
    Copy unit price from product to item
  "entity": |-
    Item
  "name": |-
    ItemUnitPriceCopyRule
  "use_case": |-
    Check Credit
- "code": |-
    Rule.after_flush_row_event(on_class=Order, calling=kafka_producer.send_row_to_kafka, if_condition=lambda row: row.date_shipped is not None, with_args={"topic": "order_shipping"})
  "description": |-
    Send order to Kafka topic when shipped
  "entity": |-
    Order
  "name": |-
    OrderKafkaEventRule
  "use_case": |-
    App Integration
