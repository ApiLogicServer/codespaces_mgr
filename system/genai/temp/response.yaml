"graphics": []
"models":
- "classname": |-
    Customer
  "code": |
    class Customer(Base):
        __tablename__ = 'customer'

        id = Column(Integer, primary_key=True, autoincrement=True)
        name = Column(String(100), nullable=False)
        credit_limit = Column(Decimal, nullable=False)
        balance = Column(Decimal, nullable=False, default=0)
  "description": |-
    A class representing a customer, storing credit limit and balance.
  "name": |-
    Customer
- "classname": |-
    Order
  "code": |
    class Order(Base):
        __tablename__ = 'order'

        id = Column(Integer, primary_key=True, autoincrement=True)
        customer_id = Column(Integer, ForeignKey('customer.id'), nullable=False)
        notes = Column(String(500))
        amount_total = Column(Decimal, default=0)
        date_shipped = Column(Date)
  "description": |-
    A class representing an order, includes a link to customer and notes.
  "name": |-
    Order
- "classname": |-
    Item
  "code": |
    class Item(Base):
        __tablename__ = 'item'

        id = Column(Integer, primary_key=True, autoincrement=True)
        order_id = Column(Integer, ForeignKey('order.id'), nullable=False)
        product_id = Column(Integer, ForeignKey('product.id'), nullable=False)
        quantity = Column(Integer, nullable=False)
        unit_price = Column(Decimal, nullable=False)
        amount = Column(Decimal, nullable=False, default=0)
  "description": |-
    A class representing items within an order, referencing order and product.
  "name": |-
    Item
- "classname": |-
    Product
  "code": |
    class Product(Base):
        __tablename__ = 'product'

        id = Column(Integer, primary_key=True, autoincrement=True)
        name = Column(String(100), nullable=False)
        unit_price = Column(Decimal, nullable=False)
  "description": |-
    A class representing products available for orders.
  "name": |-
    Product
"name": |-
  OrderManagementSystem
"rules":
- "code": |-
    Rule.constraint(validate=Customer,
                    as_condition=lambda row: row.balance <= row.credit_limit,
                    error_msg="Customer balance ({row.balance}) exceeds credit limit ({row.credit_limit})")
  "description": |-
    Ensure that a customer's balance does not exceed their credit limit.
  "entity": |-
    Customer
  "name": |-
    CustomerBalanceLessThanCreditLimit
  "use_case": |-
    Check Credit
- "code": |-
    Rule.sum(derive=Customer.balance, as_sum_of=Order.amount_total, where=lambda row: row.date_shipped is None)
  "description": |-
    Derive the customer's balance as the sum of order amount_total where date_shipped is null.
  "entity": |-
    Customer
  "name": |-
    CustomerBalanceSumOrderAmountTotal
  "use_case": |-
    Check Credit
- "code": |-
    Rule.sum(derive=Order.amount_total, as_sum_of=Item.amount)
  "description": |-
    Derive the order's amount_total as the sum of item amounts.
  "entity": |-
    Order
  "name": |-
    OrderAmountTotalSumItemAmount
  "use_case": |-
    Check Credit
- "code": |-
    Rule.formula(derive=Item.amount, as_expression=lambda row: row.quantity * row.unit_price)
  "description": |-
    Calculate item amount as quantity multiplied by unit price.
  "entity": |-
    Item
  "name": |-
    ItemAmountAsQuantityTimesUnitPrice
  "use_case": |-
    Check Credit
- "code": |-
    Rule.copy(derive=Item.unit_price, from_parent=Product.unit_price)
  "description": |-
    Copy the item unit price from the product unit price.
  "entity": |-
    Item
  "name": |-
    ItemUnitPriceCopyFromProduct
  "use_case": |-
    Check Credit
- "code": |-
    Rule.after_flush_row_event(on_class=Order, calling=kafka_producer.send_row_to_kafka,
                                   if_condition=lambda row: row.date_shipped is not None,
                                   with_args={"topic": "order_shipping"})
  "description": |-
    Send the order to a Kafka topic if date_shipped is not None.
  "entity": |-
    Order
  "name": |-
    OrderToKafkaWhenShipped
  "use_case": |-
    App Integration
