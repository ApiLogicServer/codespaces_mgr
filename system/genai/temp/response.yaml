"graphics": []
"models":
- "classname": |-
    Customer
  "code": |-
    class Customer(Base):
        __tablename__ = 'customer'

        id = Column(Integer, primary_key=True, autoincrement=True)
        name = Column(String, nullable=False)
        balance = Column(Decimal, default=0)
        credit_limit = Column(Decimal, default=1000)
  "description": |-
    Model representing a customer with basic details and financial attributes.
  "name": |-
    Customer
- "classname": |-
    Order
  "code": |-
    class Order(Base):
        __tablename__ = 'order'

        id = Column(Integer, primary_key=True, autoincrement=True)
        customer_id = Column(Integer, ForeignKey('customer.id'), nullable=False)
        date_shipped = Column(DateTime)
        notes = Column(String)
        amount_total = Column(Decimal, default=0)
  "description": |-
    Model for handling customer orders, including notes and shipment details.
  "name": |-
    Order
- "classname": |-
    Item
  "code": |-
    class Item(Base):
        __tablename__ = 'item'

        id = Column(Integer, primary_key=True, autoincrement=True)
        order_id = Column(Integer, ForeignKey('order.id'), nullable=False)
        product_id = Column(Integer, ForeignKey('product.id'), nullable=False)
        quantity = Column(Integer, nullable=False, default=1)
        unit_price = Column(Decimal, nullable=False)
        amount = Column(Decimal, default=0)
  "description": |-
    Model for order items, linked to orders and products, with pricing details.
  "name": |-
    Item
- "classname": |-
    Product
  "code": |-
    class Product(Base):
        __tablename__ = 'product'

        id = Column(Integer, primary_key=True, autoincrement=True)
        name = Column(String, nullable=False)
        unit_price = Column(Decimal, nullable=False)
  "description": |-
    Model representing a product with pricing details.
  "name": |-
    Product
"name": |-
  OrderManagementSystem
"rules":
- "code": |-
    Rule.constraint(validate=Customer,
                    as_condition=lambda row: row.balance <= row.credit_limit,
                    error_msg="Customer balance ({row.balance}) exceeds credit limit ({row.credit_limit})")
  "description": |-
    Customer balance should not exceed credit limit.
  "entity": |-
    Customer
  "name": |-
    CustomerBalanceCreditLimitConstraint
  "use_case": |-
    Check Credit
- "code": |-
    Rule.sum(derive=Customer.balance, as_sum_of=Order.amount_total, where=lambda row: row.date_shipped is None)
  "description": |-
    Customer's balance is calculated as the sum of Orders' amounts where not shipped.
  "entity": |-
    Customer
  "name": |-
    CustomerBalanceCalculation
  "use_case": |-
    Check Credit
- "code": |-
    Rule.sum(derive=Order.amount_total, as_sum_of=Item.amount)
  "description": |-
    Order's total amount is calculated as the sum of its items' amounts.
  "entity": |-
    Order
  "name": |-
    OrderAmountTotalCalculation
  "use_case": |-
    Check Credit
- "code": |-
    Rule.formula(derive=Item.amount, as_expression=lambda row: row.quantity * row.unit_price)
  "description": |-
    Item amount is calculated as quantity multiplied by unit price.
  "entity": |-
    Item
  "name": |-
    ItemAmountCalculation
  "use_case": |-
    Check Credit
- "code": |-
    Rule.copy(derive=Item.unit_price, from_parent=Product.unit_price)
  "description": |-
    Item unit price is a copy of Product unit price.
  "entity": |-
    Item
  "name": |-
    ItemUnitPriceCopy
  "use_case": |-
    Check Credit
- "code": |-
    Rule.after_flush_row_event(on_class=Order, calling=kafka_producer.send_row_to_kafka,
                           if_condition=lambda row: row.date_shipped is not None,
                           with_args={"topic": "order_shipping"})
  "description": |-
    Send Order to 'order_shipping' topic on Kafka if it's shipped.
  "entity": |-
    Order
  "name": |-
    OrderKafkaShippingEvent
  "use_case": |-
    App Integration
