"models":
- "classname": |-
    Customer
  "code": |-
    class Customer(Base):
        __tablename__ = 'customer'
        id = Column(Integer, primary_key=True, autoincrement=True)
        name = Column(String(255))
        credit_limit = Column(Decimal)
        balance = Column(Decimal)
  "description": |-
    Model for Customer with credit and balance details.
  "name": |-
    Customer
- "classname": |-
    Order
  "code": |-
    class Order(Base):
        __tablename__ = 'order'
        id = Column(Integer, primary_key=True, autoincrement=True)
        customer_id = Column(Integer, ForeignKey('customer.id'))
        amount_total = Column(Decimal)
        date_shipped = Column(DateTime)
        notes = Column(String(5000))
  "description": |-
    Model for orders with customer link and notes.
  "name": |-
    Order
- "classname": |-
    Item
  "code": |-
    class Item(Base):
        __tablename__ = 'item'
        id = Column(Integer, primary_key=True, autoincrement=True)
        order_id = Column(Integer, ForeignKey('order.id'))
        product_id = Column(Integer, ForeignKey('product.id'))
        quantity = Column(Integer)
        unit_price = Column(Decimal)
        amount = Column(Decimal)
  "description": |-
    Model for items within an order.
  "name": |-
    Item
- "classname": |-
    Product
  "code": |-
    class Product(Base):
        __tablename__ = 'product'
        id = Column(Integer, primary_key=True, autoincrement=True)
        name = Column(String(255))
        unit_price = Column(Decimal)
  "description": |-
    Model for Product with unit price.
  "name": |-
    Product
"name": |-
  ECommerceSystem
"rules":
- "code": |-
    Rule.constraint(validate=Customer, as_condition=lambda row: row.balance <= row.credit_limit, error_msg='Customer balance ({row.balance}) exceeds credit limit ({row.credit_limit})')
  "description": |-
    Ensure the customer's balance does not exceed the credit limit.
  "entity": |-
    Customer
  "name": |-
    Customer Balance Credit Limit Constraint
  "use_case": |-
    Check Credit
- "code": |-
    Rule.sum(derive=Customer.balance, as_sum_of=Order.amount_total, where=lambda row: row.date_shipped is None)
  "description": |-
    Customer balance is derived as the sum of order total amounts for not shipped orders.
  "entity": |-
    Customer
  "name": |-
    Customer Balance Sum Rule
  "use_case": |-
    Check Credit
- "code": |-
    Rule.sum(derive=Order.amount_total, as_sum_of=Item.amount)
  "description": |-
    The order's amount total is derived as the sum of all item amounts.
  "entity": |-
    Order
  "name": |-
    Order Amount Total Sum Rule
  "use_case": |-
    Check Credit
- "code": |-
    Rule.formula(derive=Item.amount, as_expression=lambda row: row.quantity * row.unit_price)
  "description": |-
    The item amount is calculated by multiplying quantity and unit price.
  "entity": |-
    Item
  "name": |-
    Item Amount Formula
  "use_case": |-
    Check Credit
- "code": |-
    Rule.copy(derive=Item.unit_price, from_parent=Product.unit_price)
  "description": |-
    The item's unit price is copied from the associated product's unit price.
  "entity": |-
    Item
  "name": |-
    Item Unit Price Copy Rule
  "use_case": |-
    Check Credit
- "code": |-
    Rule.after_flush_row_event(on_class=Order, calling=kafka_producer.send_row_to_kafka, if_condition=lambda row: row.date_shipped is not None, with_args={'topic': 'order_shipping'})
  "description": |-
    Send Order to Kafka when shipped.
  "entity": |-
    Order
  "name": |-
    Order Kafka Integration Rule
  "use_case": |-
    App Integration
