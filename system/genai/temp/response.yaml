"graphics": []
"models":
- "classname": |-
    Customer
  "code": |-
    class Customer(Base):
        __tablename__ = 'customer'
        id = Column(Integer, primary_key=True)
        name = Column(String)
        balance = Column(Decimal, default=0)
        credit_limit = Column(Decimal, default=0)
  "description": |-
    A class to represent customers.
  "name": |-
    Customer
- "classname": |-
    Order
  "code": |-
    class Order(Base):
        __tablename__ = 'order'
        id = Column(Integer, primary_key=True)
        customer_id = Column(Integer, ForeignKey('customer.id'))
        amount_total = Column(Decimal, default=0)
        notes = Column(String)
        date_shipped = Column(Date)
  "description": |-
    A class to represent orders placed by customers, including notes.
  "name": |-
    Order
- "classname": |-
    Item
  "code": |-
    class Item(Base):
        __tablename__ = 'item'
        id = Column(Integer, primary_key=True)
        order_id = Column(Integer, ForeignKey('order.id'))
        product_id = Column(Integer, ForeignKey('product.id'))
        quantity = Column(Integer, default=0)
        unit_price = Column(Decimal, default=0)
        amount = Column(Decimal, default=0)
  "description": |-
    A class to represent individual items in an order.
  "name": |-
    Item
- "classname": |-
    Product
  "code": |-
    class Product(Base):
        __tablename__ = 'product'
        id = Column(Integer, primary_key=True)
        name = Column(String)
        unit_price = Column(Decimal, default=0)
  "description": |-
    A class to represent products available for sale.
  "name": |-
    Product
"name": |-
  OrderManagementSystem
"rules":
- "code": |-
    Rule.constraint(validate=Customer, as_condition=lambda row: row.balance <= row.credit_limit, error_msg="Customer balance ({row.balance}) exceeds credit limit ({row.credit_limit})")
  "description": |-
    Ensure that a customer's balance is under their credit limit.
  "entity": |-
    Customer
  "name": |-
    CustomerCreditConstraint
  "use_case": |-
    Check Credit
- "code": |-
    Rule.sum(derive=Customer.balance, as_sum_of=Order.amount_total, where=lambda row: row.date_shipped is None)
  "description": |-
    Calculate customer's balance as sum of order total amounts where not yet shipped.
  "entity": |-
    Customer
  "name": |-
    CustomerBalanceCalculation
  "use_case": |-
    Check Credit
- "code": |-
    Rule.sum(derive=Order.amount_total, as_sum_of=Item.amount)
  "description": |-
    Calculate order amount total as sum of item amounts.
  "entity": |-
    Order
  "name": |-
    OrderTotalCalculation
  "use_case": |-
    Check Credit
- "code": |-
    Rule.formula(derive=Item.amount, as_expression=lambda row: row.quantity * row.unit_price)
  "description": |-
    Calculate item amount as quantity multiplied by unit price.
  "entity": |-
    Item
  "name": |-
    ItemAmountCalculation
  "use_case": |-
    Check Credit
- "code": |-
    Rule.copy(derive=Item.unit_price, from_parent=Product.unit_price)
  "description": |-
    Copy the product's unit price into the item's unit price.
  "entity": |-
    Item
  "name": |-
    ItemUnitPriceCopy
  "use_case": |-
    Check Credit
- "code": |-
    Rule.after_flush_row_event(on_class=Order, calling=kafka_producer.send_row_to_kafka, if_condition=lambda row: row.date_shipped is not None, with_args={"topic": "order_shipping"})
  "description": |-
    Send the order to Kafka topic 'order_shipping' if date shipped is not None.
  "entity": |-
    Order
  "name": |-
    SendOrderToKafka
  "use_case": |-
    App Integration
"test_data": |-
  # Creating test data rows for customers, orders, items, and products
  customer1 = Customer(name="Alice", balance=Decimal('3000'), credit_limit=Decimal('5000'))
  customer2 = Customer(name="Bob", balance=Decimal('2000'), credit_limit=Decimal('4000'))
  customer3 = Customer(name="Charlie", balance=Decimal('1500'), credit_limit=Decimal('3500'))
  customer4 = Customer(name="David", balance=Decimal('1200'), credit_limit=Decimal('3000'))

  product1 = Product(name="Product A", unit_price=Decimal('50'))
  product2 = Product(name="Product B", unit_price=Decimal('30'))
  product3 = Product(name="Product C", unit_price=Decimal('20'))
  product4 = Product(name="Product D", unit_price=Decimal('10'))

  order1 = Order(customer_id=customer1.id, amount_total=Decimal('150'), notes="Urgent delivery", date_shipped=None)
  order2 = Order(customer_id=customer2.id, amount_total=Decimal('75'), notes="Standard delivery", date_shipped=None)
  order3 = Order(customer_id=customer3.id, amount_total=Decimal('90'), notes="Express delivery", date_shipped=date(2023, 8, 20))
  order4 = Order(customer_id=customer4.id, amount_total=Decimal('110'), notes="Gift package", date_shipped=date(2023, 8, 21))

  item1 = Item(order_id=order1.id, product_id=product1.id, quantity=3, unit_price=Decimal('50'), amount=Decimal('150'))
  item2 = Item(order_id=order2.id, product_id=product2.id, quantity=5, unit_price=Decimal('15'), amount=Decimal('75'))
  item3 = Item(order_id=order3.id, product_id=product3.id, quantity=3, unit_price=Decimal('20'), amount=Decimal('60'))
  item4 = Item(order_id=order4.id, product_id=product4.id, quantity=11, unit_price=Decimal('10'), amount=Decimal('110'))
