<div class="container">
<o-form-container breadcrumb="yes" breadcrumb-label-columns="CategoryName_ColumnName" breadcrumb-separator=", " class="fill-form">
      <o-form #form attr="Category_form_edit" 
        service="Category" 
        entity="Category" 
        fxLayout="column" 
        show-header="yes" 
        header-actions="R;U;D"
        #oDetailForm keys="Id" 
        keys-sql-types="INTEGER" 
        show-header-navigation="yes"
        (onDataLoaded)="onDataLoaded($event)">

  <o-row attr="row1" layout-align="start stretch">
    <div fxLayout="row wrap" fxLayoutAlign="start start" fxFlex fxLayoutGap="14px">
      
      <o-text-input #CategoryName_ColumnName attr="CategoryName_ColumnName" label=" Category Name_ Column Name" enabled="yes" required="no" fxFlex="20%" class="form-field"></o-text-input>
      
      <o-text-input #Description attr="Description" label="Description" enabled="yes" required="no" fxFlex="20%" class="form-field"></o-text-input>
      
      <o-integer-input #Id attr="Id" label="Id" type="integer" editable="no" required="no" ></o-integer-input>
      
      <o-integer-input #Client_id attr="Client_id" label="Client_id" type="integer" editable="no" required="no" ></o-integer-input>
      
    </div>
  </o-row>
      
      <mat-tab-group fxFill>
        
        <mat-tab label="PRODUCT-CategoryId">
    <div layout-padding>
      <o-table 
        attr="ProductTable" 
        service="Product" 
        entity="Product" 
        keys="Id"
        parent-keys="CategoryId:Id"
        columns="ProductName;CategoryId;QuantityPerUnit;UnitPrice;UnitsInStock;UnitsOnOrder;ReorderLevel;Id;SupplierId;Discontinued;UnitsShipped"  
        horizontal-scroll="yes"
        detail-form-route="Product" 
        edit-form-route="Product"
        visible-columns="ProductName;CategoryId;QuantityPerUnit;UnitPrice;UnitsInStock;UnitsOnOrder;ReorderLevel;Id;SupplierId;Discontinued;UnitsShipped"  
        sort-columns="ProductName" 
        query-rows="25" 
        quick-filter="yes"
        row-height="medium" 
        select-all-checkbox="true" 
        pageable="yes"  
        auto-adjust="true" 
        virtual-scroll="yes" 
        insert-button="yes" 
        delete-button="yes" 
        fixed-header="true" 
        class="vertical-padding-8"
        edition-mode="dblclick" 
        horizontal-scroll="yes" class="fill-form">
        
          <o-table-column #ProductName attr="ProductName" title=" Product Name" editable="no" required="no" content-align="left"></o-table-column>
        
          <o-table-column attr="CategoryId" title="Category">
    <o-table-cell-renderer-service attr="CategoryId" 
        service="Category" entity="CategoryType" columns="Id;CategoryName_ColumnName"
        parent-keys="Id:CategoryId"
        value-column="CategoryName_ColumnName" keys="CategoryId"
        visible-columns="CategoryName_ColumnName" separator=" - " width="680px">
    </o-table-cell-renderer-service>
</o-table-column>
        
          <o-table-column #QuantityPerUnit attr="QuantityPerUnit" title="QuantityPerUnit" editable="no" required="no" content-align="left"></o-table-column>
        
          <o-table-column #UnitPrice attr="UnitPrice" title="UnitPrice" type="real" min-decimal-digits="2" max-decimal-digits="4" min="0" max="1000000.0000" content-align="center"></o-table-column>
        
          <o-table-column #UnitsInStock attr="UnitsInStock" title="UnitsInStock" type="integer" editable="no" required="yes" content-align="center"></o-table-column>
        
          <o-table-column #UnitsOnOrder attr="UnitsOnOrder" title="UnitsOnOrder" type="integer" editable="no" required="yes" content-align="center"></o-table-column>
        
          <o-table-column #ReorderLevel attr="ReorderLevel" title="ReorderLevel" type="integer" editable="no" required="yes" content-align="center"></o-table-column>
        
          <o-table-column #Id attr="Id" title="Id" type="integer" editable="no" required="no" content-align="center"></o-table-column>
        
          <o-table-column #SupplierId attr="SupplierId" title="SupplierId" type="integer" editable="no" required="yes" content-align="center"></o-table-column>
        
          <o-table-column #Discontinued attr="Discontinued" title="Discontinued" type="integer" editable="no" required="yes" content-align="center"></o-table-column>
        
          <o-table-column #UnitsShipped attr="UnitsShipped" title="UnitsShipped" type="integer" editable="no" required="no" content-align="center"></o-table-column>
        
        <o-table-paginator page-size-options="25;50;100"></o-table-paginator>
      </o-table>
    </div>
</mat-tab>
        
      </mat-tab-group>
      
    </o-form>
  </o-form-container>
</div>
