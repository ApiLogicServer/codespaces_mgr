"graphics": []
"models":
- "classname": |-
    Customer
  "code": |-
    class Customer(Base):
        __tablename__ = 'customer'

        id = Column(Integer, primary_key=True, autoincrement=True)
        name = Column(String)
        credit_limit = Column(Numeric)
        balance = Column(Numeric)
  "description": |-
    Table for customers with credit limit and balance.
  "name": |-
    Customer
- "classname": |-
    Order
  "code": |-
    class Order(Base):
        __tablename__ = 'order'

        id = Column(Integer, primary_key=True, autoincrement=True)
        customer_id = Column(Integer, ForeignKey('customer.id'))
        date_shipped = Column(DateTime, nullable=True)
        amount_total = Column(Numeric)
        notes = Column(String)

        # Relationship
        customer = relationship('Customer', backref='orders')
  "description": |-
    Table for orders related to customers with shipping details.
  "name": |-
    Order
- "classname": |-
    Item
  "code": |-
    class Item(Base):
        __tablename__ = 'item'

        id = Column(Integer, primary_key=True, autoincrement=True)
        order_id = Column(Integer, ForeignKey('order.id'))
        product_id = Column(Integer, ForeignKey('product.id'))
        quantity = Column(Numeric)
        unit_price = Column(Numeric)
        amount = Column(Numeric)

        # Relationships
        order = relationship('Order', backref='items')
        product = relationship('Product', backref='items')
  "description": |-
    Table for items in an order with price and quantity details.
  "name": |-
    Item
- "classname": |-
    Product
  "code": |-
    class Product(Base):
        __tablename__ = 'product'

        id = Column(Integer, primary_key=True, autoincrement=True)
        name = Column(String)
        unit_price = Column(Numeric)
  "description": |-
    Table for products with pricing.
  "name": |-
    Product
"name": |-
  CustomerOrderSystem
"rules":
- "code": |-
    Rule.constraint(validate=Customer, as_condition=lambda row: row.balance <= row.credit_limit, error_msg="Customer balance ({row.balance}) exceeds credit limit ({row.credit_limit})")
  "description": |-
    Ensures customer's balance does not exceed credit limit.
  "entity": |-
    Customer
  "name": |-
    Customer Balance Check
  "use_case": |-
    Check Credit
- "code": |-
    Rule.sum(derive=Customer.balance, as_sum_of=Order.amount_total, where=lambda row: row.date_shipped is None)
  "description": |-
    Balances are summed from all pending order amounts.
  "entity": |-
    Customer
  "name": |-
    Customer Balance Sum
  "use_case": |-
    Check Credit
- "code": |-
    Rule.sum(derive=Order.amount_total, as_sum_of=Item.amount)
  "description": |-
    Derives the total order amount from individual item amounts.
  "entity": |-
    Order
  "name": |-
    Order Amount Total Calculation
  "use_case": |-
    Check Credit
- "code": |-
    Rule.formula(derive=Item.amount, as_expression=lambda row: row.quantity * row.unit_price)
  "description": |-
    Calculates item amount using quantity and unit price.
  "entity": |-
    Item
  "name": |-
    Item Amount Calculation
  "use_case": |-
    Check Credit
- "code": |-
    Rule.copy(derive=Item.unit_price, from_parent=Product.unit_price)
  "description": |-
    Copies unit price from product to order item.
  "entity": |-
    Item
  "name": |-
    Unit Price Copy Rule
  "use_case": |-
    Check Credit
- "code": |-
    Rule.after_flush_row_event(on_class=Order, calling=kafka_producer.send_row_to_kafka, if_condition=lambda row: row.date_shipped is not None, with_args={"topic": "order_shipping"})
  "description": |-
    Send order to Kafka if it is shipped.
  "entity": |-
    Order
  "name": |-
    Order Kafka Dispatch
  "use_case": |-
    App Integration
