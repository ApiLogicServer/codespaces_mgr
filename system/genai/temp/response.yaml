"graphics": []
"models":
- "classname": |-
    Customer
  "code": |-
    class Customer(Base):
        __tablename__ = 'customer'
        Id = Column(Integer, primary_key=True, autoincrement=True)
        Name = Column(String(255))
        Balance = Column(Decimal, default=0.0)  # Derived attribute
        CreditLimit = Column(Decimal)
  "description": |-
    Customer model with derived attribute for balance and a credit limit.
  "name": |-
    Customer
- "classname": |-
    Order
  "code": |-
    class Order(Base):
        __tablename__ = 'order'
        Id = Column(Integer, primary_key=True, autoincrement=True)
        CustomerId = Column(Integer, ForeignKey('customer.Id'))
        AmountTotal = Column(Decimal, default=0.0)  # Derived attribute
        DateShipped = Column(DateTime, nullable=True)
        Notes = Column(String(8000))
  "description": |-
    Order model with derived attribute for amount total and a field for notes.
  "name": |-
    Order
- "classname": |-
    Item
  "code": |-
    class Item(Base):
        __tablename__ = 'item'
        Id = Column(Integer, primary_key=True, autoincrement=True)
        OrderId = Column(Integer, ForeignKey('order.Id'))
        ProductId = Column(Integer, ForeignKey('product.Id'))
        Quantity = Column(Integer)
        UnitPrice = Column(Decimal)  # Copied from Product
        Amount = Column(Decimal, default=0.0)  # Derived attribute
  "description": |-
    Item model with attributes for quantity, unit price (copied from product) and derived amount.
  "name": |-
    Item
- "classname": |-
    Product
  "code": |-
    class Product(Base):
        __tablename__ = 'product'
        Id = Column(Integer, primary_key=True, autoincrement=True)
        Name = Column(String(255))
        UnitPrice = Column(Decimal)
  "description": |-
    Product model with basic pricing.
  "name": |-
    Product
"name": |-
  InventoryManagementSystem
"rules":
- "code": |-
    Rule.constraint(validate=Customer, as_condition=lambda row: row.Balance <= row.CreditLimit, error_msg='Customer balance ({row.Balance}) exceeds credit limit ({row.CreditLimit})')
  "description": |-
    Ensure a customer's balance does not exceed their credit limit.
  "entity": |-
    Customer
  "name": |-
    CustomerBalanceLessThanCreditLimit
  "use_case": |-
    Check Credit
- "code": |-
    Rule.sum(derive=Customer.Balance, as_sum_of=Order.AmountTotal, where=lambda row: row.DateShipped is None)
  "description": |-
    Calculate customer's balance as the sum of their unshipped orders.
  "entity": |-
    Customer
  "name": |-
    CustomerBalanceSumOfOrders
  "use_case": |-
    Check Credit
- "code": |-
    Rule.sum(derive=Order.AmountTotal, as_sum_of=Item.Amount)
  "description": |-
    Calculate order's total amount as the sum of item amounts.
  "entity": |-
    Order
  "name": |-
    OrderAmountTotalSumOfItems
  "use_case": |-
    Check Credit
- "code": |-
    Rule.formula(derive=Item.Amount, as_expression=lambda row: row.Quantity * row.UnitPrice)
  "description": |-
    Calculate item amount as product of quantity and unit price.
  "entity": |-
    Item
  "name": |-
    ItemAmountCalculation
  "use_case": |-
    Check Credit
- "code": |-
    Rule.copy(derive=Item.UnitPrice, from_parent=Product.UnitPrice)
  "description": |-
    Copy the unit price from the product to the item when added to an order.
  "entity": |-
    Item
  "name": |-
    CopyUnitPriceFromProduct
  "use_case": |-
    Check Credit
- "code": |-
    Rule.after_flush_row_event(on_class=Order, calling=kafka_producer.send_row_to_kafka, if_condition=lambda row: row.DateShipped is not None, with_args={'topic': 'order_shipping'})
  "description": |-
    Send Order to Kafka if DateShipped is not None.
  "entity": |-
    Order
  "name": |-
    SendOrderToKafka
  "use_case": |-
    App Integration
