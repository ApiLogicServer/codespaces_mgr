"graphics": []
"models":
- "classname": |-
    Customer
  "code": |-
    class Customer(Base):
        __tablename__ = 'customer'

        id = Column(Integer, primary_key=True, autoincrement=True)
        name = Column(String, nullable=False)
        balance = Column(Decimal)
        credit_limit = Column(Decimal)
  "description": |-
    SQLAlchemy model for Customer entity.
  "name": |-
    Customer
- "classname": |-
    Order
  "code": |-
    class Order(Base):
        __tablename__ = 'order'

        id = Column(Integer, primary_key=True, autoincrement=True)
        customer_id = Column(Integer, ForeignKey('customer.id'), nullable=False)
        amount_total = Column(Decimal)
        notes = Column(String)
        date_shipped = Column(DateTime)
  "description": |-
    SQLAlchemy model for Order entity.
  "name": |-
    Order
- "classname": |-
    Item
  "code": |-
    class Item(Base):
        __tablename__ = 'item'

        id = Column(Integer, primary_key=True, autoincrement=True)
        order_id = Column(Integer, ForeignKey('order.id'), nullable=False)
        product_id = Column(Integer, ForeignKey('product.id'), nullable=False)
        quantity = Column(Integer, nullable=False)
        unit_price = Column(Decimal)
        amount = Column(Decimal)
  "description": |-
    SQLAlchemy model for Item entity.
  "name": |-
    Item
- "classname": |-
    Product
  "code": |-
    class Product(Base):
        __tablename__ = 'product'

        id = Column(Integer, primary_key=True, autoincrement=True)
        name = Column(String, nullable=False)
        unit_price = Column(Decimal)
  "description": |-
    SQLAlchemy model for Product entity.
  "name": |-
    Product
"name": |-
  CustomerOrderProductSystem
"rules":
- "code": |-
    Rule.constraint(validate=Customer, as_condition=lambda row: row.balance <= row.credit_limit, error_msg='Customer balance ({row.balance}) exceeds credit limit ({row.credit_limit})')
  "description": |-
    Ensure Customer balance is less than credit limit.
  "entity": |-
    Customer
  "name": |-
    Check Credit Rule 1
  "use_case": |-
    Check Credit
- "code": |-
    Rule.sum(derive=Customer.balance, as_sum_of=Order.amount_total, where=lambda row: row.date_shipped is None)
  "description": |-
    Calculate Customer balance as sum of all unpaid Orders.
  "entity": |-
    Customer
  "name": |-
    Check Credit Rule 2
  "use_case": |-
    Check Credit
- "code": |-
    Rule.sum(derive=Order.amount_total, as_sum_of=Item.amount)
  "description": |-
    Order amount_total is derived from the sum of its Items amounts.
  "entity": |-
    Order
  "name": |-
    Check Credit Rule 3
  "use_case": |-
    Check Credit
- "code": |-
    Rule.formula(derive=Item.amount, as_expression=lambda row: row.quantity * row.unit_price)
  "description": |-
    Calculate Item amount as the product of quantity and unit price.
  "entity": |-
    Item
  "name": |-
    Check Credit Rule 4
  "use_case": |-
    Check Credit
- "code": |-
    Rule.copy(derive=Item.unit_price, from_parent=Product.unit_price)
  "description": |-
    Copy unit price for Item from corresponding Product's unit price.
  "entity": |-
    Item
  "name": |-
    Check Credit Rule 5
  "use_case": |-
    Check Credit
- "code": |-
    Rule.after_flush_row_event(on_class=Order, calling=kafka_producer.send_row_to_kafka, if_condition=lambda row: row.date_shipped is not None, with_args={'topic': 'order_shipping'})
  "description": |-
    Send Order to Kafka if date shipped is not null.
  "entity": |-
    Order
  "name": |-
    App Integration Rule
  "use_case": |-
    App Integration
