"graphics": []
"models":
- "classname": |-
    Customer
  "code": |-
    class Customer(Base):
        __tablename__ = 'customer'

        id = Column(Integer, primary_key=True, autoincrement=True)
        name = Column(String, nullable=False)
        balance = Column(Decimal, default=0)
        credit_limit = Column(Decimal, nullable=False)
  "description": |-
    Represents a customer with balance, credit limit.
  "name": |-
    Customer
- "classname": |-
    Order
  "code": |
    class Order(Base):
        __tablename__ = 'order'

        id = Column(Integer, primary_key=True, autoincrement=True)
        customer_id = Column(Integer, ForeignKey('customer.id'), nullable=False)
        amount_total = Column(Decimal, default=0)
        date_shipped = Column(DateTime)
        notes = Column(String)

        # ForeignKey relationship is implicit through customer_id
  "description": |-
    Represents an order with a link to the customer, total amount, shipment date, and notes.
  "name": |-
    Order
- "classname": |-
    Item
  "code": |
    class Item(Base):
        __tablename__ = 'item'

        id = Column(Integer, primary_key=True, autoincrement=True)
        order_id = Column(Integer, ForeignKey('order.id'), nullable=False)
        product_id = Column(Integer, ForeignKey('product.id'), nullable=False)
        quantity = Column(Integer, nullable=False)
        unit_price = Column(Decimal, nullable=False)
        amount = Column(Decimal, default=0)

        # ForeignKey relationships through order_id and product_id
  "description": |-
    Represents an order item with quantity, unit price, and total amount.
  "name": |-
    Item
- "classname": |-
    Product
  "code": |-
    class Product(Base):
        __tablename__ = 'product'

        id = Column(Integer, primary_key=True, autoincrement=True)
        name = Column(String, nullable=False)
        unit_price = Column(Decimal, nullable=False)
  "description": |-
    Represents a product with unit price.
  "name": |-
    Product
"name": |-
  OrderManagementSystem
"rules":
- "code": |-
    Rule.constraint(validate=Customer, as_condition=lambda row: row.balance <= row.credit_limit, error_msg="Customer balance ({row.balance}) exceeds credit limit ({row.credit_limit})")
  "description": |-
    Ensures that a customer's balance does not exceed their credit limit.
  "entity": |-
    Customer
  "name": |-
    Customer Balance Constraint
  "use_case": |-
    Check Credit
- "code": |-
    Rule.sum(derive=Customer.balance, as_sum_of=Order.amount_total, where=lambda row: row.date_shipped is None)
  "description": |-
    Calculates customer's balance as the sum of their order amounts for unshipped orders.
  "entity": |-
    Customer
  "name": |-
    Customer Balance Derivation
  "use_case": |-
    Check Credit
- "code": |-
    Rule.sum(derive=Order.amount_total, as_sum_of=Item.amount)
  "description": |-
    Calculates order's total amount as the sum of its item amounts.
  "entity": |-
    Order
  "name": |-
    Order Amount Total Derivation
  "use_case": |-
    Check Credit
- "code": |-
    Rule.formula(derive=Item.amount, as_expression=lambda row: row.quantity * row.unit_price)
  "description": |-
    Calculates an item's amount as the product of its quantity and unit price.
  "entity": |-
    Item
  "name": |-
    Item Amount Calculation
  "use_case": |-
    Check Credit
- "code": |-
    Rule.copy(derive=Item.unit_price, from_parent=Product.unit_price)
  "description": |-
    Ensures the item's unit price is copied from product unit price.
  "entity": |-
    Item
  "name": |-
    Item Unit Price Copy
  "use_case": |-
    Check Credit
- "code": |-
    Rule.after_flush_row_event(on_class=Order, calling=kafka_producer.send_row_to_kafka, if_condition=lambda row: row.date_shipped is not None, with_args={"topic": "order_shipping"})
  "description": |-
    Sends order data to Kafka when shipped.
  "entity": |-
    Order
  "name": |-
    Order Kafka Integration
  "use_case": |-
    App Integration
