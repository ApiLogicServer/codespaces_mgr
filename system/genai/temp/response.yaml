"graphics": []
"models":
- "classname": |-
    Customer
  "code": |-
    class Customer(Base):
        __tablename__ = 'customer'

        id = Column(Integer, primary_key=True)
        name = Column(String(255))
        balance = Column(Decimal)
        credit_limit = Column(Decimal)
  "description": |-
    Customer model to store customer information including balance and credit limit.
  "name": |-
    Customer
- "classname": |-
    Order
  "code": |-
    class Order(Base):
        __tablename__ = 'order'

        id = Column(Integer, primary_key=True)
        customer_id = Column(Integer, ForeignKey('customer.id'))
        amount_total = Column(Decimal)
        date_shipped = Column(DateTime)
        notes = Column(String(255))
  "description": |-
    Order model containing details of orders including customer relationships and notes.
  "name": |-
    Order
- "classname": |-
    Item
  "code": |-
    class Item(Base):
        __tablename__ = 'item'

        id = Column(Integer, primary_key=True)
        order_id = Column(Integer, ForeignKey('order.id'))
        product_id = Column(Integer, ForeignKey('product.id'))
        quantity = Column(Integer)
        unit_price = Column(Decimal)
        amount = Column(Decimal)
  "description": |-
    Item model for items within orders having relationships to orders and products.
  "name": |-
    Item
- "classname": |-
    Product
  "code": |-
    class Product(Base):
        __tablename__ = 'product'

        id = Column(Integer, primary_key=True)
        name = Column(String(255))
        unit_price = Column(Decimal)
  "description": |-
    Product model storing product information including price.
  "name": |-
    Product
"name": |-
  CustomerOrderSystem
"rules":
- "code": |-
    Rule.constraint(validate=Customer,
                    as_condition=lambda row: row.balance <= row.credit_limit,
                    error_msg="Customer balance ({row.balance}) exceeds credit limit ({row.credit_limit})")
  "description": |-
    Enforces that a Customer's balance is less than their credit limit.
  "entity": |-
    Customer
  "name": |-
    Ensure_Customer_Balance_Less_Than_Credit_Limit
  "use_case": |-
    Check Credit
- "code": |-
    Rule.sum(derive=Customer.balance, as_sum_of=Order.amount_total, where=lambda row: row.date_shipped is None)
  "description": |-
    Derive the Customer's balance as the sum of Order amount_total where date_shipped is null.
  "entity": |-
    Customer
  "name": |-
    Calculate_Customer_Balance
  "use_case": |-
    Check Credit
- "code": |-
    Rule.sum(derive=Order.amount_total, as_sum_of=Item.amount)
  "description": |-
    Derive the Order's amount_total as the sum of Item amount.
  "entity": |-
    Order
  "name": |-
    Calculate_Order_Amount_Total
  "use_case": |-
    Check Credit
- "code": |-
    Rule.formula(derive=Item.amount, as_expression=lambda row: row.quantity * row.unit_price)
  "description": |-
    Derive the Item amount based on quantity and unit_price.
  "entity": |-
    Item
  "name": |-
    Calculate_Item_Amount
  "use_case": |-
    Check Credit
- "code": |-
    Rule.copy(derive=Item.unit_price, from_parent=Product.unit_price)
  "description": |-
    Copies the Item's unit_price from Product's unit_price.
  "entity": |-
    Item
  "name": |-
    Copy_Item_Unit_Price
  "use_case": |-
    Check Credit
- "code": |-
    Rule.after_flush_row_event(on_class=Order, calling=kafka_producer.send_row_to_kafka,
                   if_condition=lambda row: row.date_shipped is not None,
                   with_args={"topic": "order_shipping"})
  "description": |-
    Send the Order to Kafka topic 'order_shipping' if the date_shipped is not None.
  "entity": |-
    Order
  "name": |-
    Order_to_Kafka_Integration
  "use_case": |-
    App Integration
