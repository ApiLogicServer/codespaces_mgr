"graphics": []
"models":
- "classname": |-
    Customer
  "code": |-
    class Customer(Base):
        __tablename__ = 'customer'

        id = Column(Integer, primary_key=True, autoincrement=True)
        name = Column(String)
        credit_limit = Column(Decimal)
        balance = Column(Decimal) # Derived Rule Sum
  "description": |-
    Model for Customer with derived balance attribute to sum orders with unshipped items.
  "name": |-
    Customer
- "classname": |-
    Order
  "code": |-
    class Order(Base):
        __tablename__ = 'order'

        id = Column(Integer, primary_key=True, autoincrement=True)
        customer_id = Column(Integer, ForeignKey('customer.id'))
        notes = Column(String)
        date_shipped = Column(DateTime)
        amount_total = Column(Decimal) # Derived Rule Sum
  "description": |-
    Model for Order with notes and derived amount_total attribute to sum item amounts.
  "name": |-
    Order
- "classname": |-
    Item
  "code": |-
    class Item(Base):
        __tablename__ = 'item'

        id = Column(Integer, primary_key=True, autoincrement=True)
        order_id = Column(Integer, ForeignKey('order.id'))
        product_id = Column(Integer, ForeignKey('product.id'))
        quantity = Column(Integer)
        unit_price = Column(Decimal) # Copied Rule
        amount = Column(Decimal) # Derived Rule Formula
  "description": |-
    Model for Item with derived amount and copied unit price from Product.
  "name": |-
    Item
- "classname": |-
    Product
  "code": |-
    class Product(Base):
        __tablename__ = 'product'

        id = Column(Integer, primary_key=True, autoincrement=True)
        name = Column(String)
        unit_price = Column(Decimal)
  "description": |-
    Model for Product with unit price attribute copied to Item.
  "name": |-
    Product
"name": |-
  CommerceSystem
"rules":
- "code": |-
    Rule.constraint(validate=Customer,
        as_condition=lambda row: row.balance <= row.credit_limit,
        error_msg="Customer balance ({row.balance}) exceeds credit limit ({row.credit_limit})")
  "description": |-
    Ensure customer's balance does not exceed credit limit.
  "entity": |-
    Customer
  "name": |-
    Customer Credit Limit Constraint
  "use_case": |-
    Check Credit
- "code": |-
    Rule.sum(derive=Customer.balance, as_sum_of=Order.amount_total, where=lambda row: row.date_shipped is None)
  "description": |-
    Accumulate unshipped order totals into customer balance.
  "entity": |-
    Customer
  "name": |-
    Customer Balance Derivation
  "use_case": |-
    Check Credit
- "code": |-
    Rule.sum(derive=Order.amount_total, as_sum_of=Item.amount)
  "description": |-
    Sum item amounts for an order's total amount.
  "entity": |-
    Order
  "name": |-
    Order Amount Total Derivation
  "use_case": |-
    Check Credit
- "code": |-
    Rule.formula(derive=Item.amount, as_expression=lambda row: row.quantity * row.unit_price)
  "description": |-
    Calculate item amount as quantity multiplied by unit price.
  "entity": |-
    Item
  "name": |-
    Item Amount Formula
  "use_case": |-
    Check Credit
- "code": |-
    Rule.copy(derive=Item.unit_price, from_parent=Product.unit_price)
  "description": |-
    Copy unit price from Product to Item.
  "entity": |-
    Item
  "name": |-
    Item Unit Price Copy
  "use_case": |-
    Check Credit
- "code": |-
    Rule.after_flush_row_event(on_class=Order,
        calling=kafka_producer.send_row_to_kafka,
        if_condition=lambda row: row.date_shipped is not None,
        with_args={"topic": "order_shipping"})
  "description": |-
    Trigger sending order data to Kafka when order is shipped.
  "entity": |-
    Order
  "name": |-
    Order Shipping to Kafka
  "use_case": |-
    App Integration
